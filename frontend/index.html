<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognito DR Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
    .region-select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      cursor: pointer;
      background: white;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login { background: #4285f4; color: white; }
    .btn-login:hover { background: #3367d6; }
    .btn-logout { background: #e0e0e0; color: #333; margin-top: 12px; }
    .btn-logout:hover { background: #ccc; }
    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 8px;
      display: none;
    }
    .result.east { background: #e3f2fd; border: 2px solid #2196f3; }
    .result.west { background: #fff3e0; border: 2px solid #ff9800; }
    .region-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .east .region-badge { background: #2196f3; color: white; }
    .west .region-badge { background: #ff9800; color: white; }
    .user-email { color: #555; font-size: 14px; }
    .label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cognito DR Demo</h1>
    <p class="subtitle">AWS Cognito Identity Provider Failover</p>

    <div id="login-section">
      <select id="region-select" class="region-select">
        <option value="us-east-1">us-east-1 (N. Virginia)</option>
        <option value="us-west-2">us-west-2 (Oregon)</option>
      </select>
      <button class="btn btn-login" onclick="login()">Sign in with Google</button>
    </div>

    <div id="result" class="result">
      <p class="label">Authenticated via Cognito in</p>
      <div id="region-badge" class="region-badge"></div>
      <br>
      <p class="label" style="margin-top: 12px;">User</p>
      <p id="user-email" class="user-email"></p>
      <button class="btn btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <script>
    var CONFIG = {
      'us-east-1': {
        domain: '${cognito_east_domain}',
        clientId: '${cognito_east_client_id}',
        region: '${cognito_east_region}'
      },
      'us-west-2': {
        domain: '${cognito_west_domain}',
        clientId: '${cognito_west_client_id}',
        region: '${cognito_west_region}'
      }
    };
    var CALLBACK_URL = '${cloudfront_url}';

    function login() {
      var region = document.getElementById('region-select').value;
      localStorage.setItem('cognito_region', region);
      var cfg = CONFIG[region];
      var url = cfg.domain + '/login'
        + '?client_id=' + cfg.clientId
        + '&response_type=token'
        + '&scope=openid+email+profile'
        + '&redirect_uri=' + encodeURIComponent(CALLBACK_URL);
      window.location.href = url;
    }

    function logout() {
      var region = localStorage.getItem('cognito_region') || 'us-east-1';
      localStorage.removeItem('cognito_region');
      var cfg = CONFIG[region];
      var url = cfg.domain + '/logout'
        + '?client_id=' + cfg.clientId
        + '&logout_uri=' + encodeURIComponent(CALLBACK_URL);
      window.location.href = url;
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(
        atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join('')
      );
      return JSON.parse(jsonPayload);
    }

    function handleCallback() {
      var hash = window.location.hash.substring(1);
      if (!hash) return;

      var params = {};
      hash.split('&').forEach(function(part) {
        var kv = part.split('=');
        params[kv[0]] = decodeURIComponent(kv[1]);
      });

      if (!params.id_token) return;

      var claims = parseJwt(params.id_token);
      var region = localStorage.getItem('cognito_region') || 'unknown';
      var isEast = region === 'us-east-1';

      document.getElementById('login-section').style.display = 'none';
      var resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.className = 'result ' + (isEast ? 'east' : 'west');
      document.getElementById('region-badge').textContent = region;
      document.getElementById('user-email').textContent = claims.email || claims.sub || 'Unknown';

      // Clean up the URL
      history.replaceState(null, '', window.location.pathname);
    }

    handleCallback();
  </script>
</body>
</html>
