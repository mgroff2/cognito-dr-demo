<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cognito DR Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a2e; }
    .subtitle { color: #666; margin-bottom: 32px; font-size: 14px; }
    .region-select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      cursor: pointer;
      background: white;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login { background: #4285f4; color: white; }
    .btn-login:hover { background: #3367d6; }
    .btn-logout { background: #e0e0e0; color: #333; margin-top: 12px; }
    .btn-logout:hover { background: #ccc; }
    .result {
      margin-top: 24px;
      padding: 24px;
      border-radius: 8px;
      display: none;
    }
    .result.east { background: #e3f2fd; border: 2px solid #2196f3; }
    .result.west { background: #fff3e0; border: 2px solid #ff9800; }
    .region-badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 12px;
    }
    .east .region-badge { background: #2196f3; color: white; }
    .west .region-badge { background: #ff9800; color: white; }
    .user-email { color: #555; font-size: 14px; }
    .label { font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .id-row { display: flex; justify-content: space-between; text-align: left; margin-top: 12px; padding: 8px 12px; background: rgba(0,0,0,0.04); border-radius: 6px; }
    .id-row + .id-row { margin-top: 6px; }
    .id-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
    .id-value { font-size: 12px; font-family: monospace; color: #333; word-break: break-all; }
    .id-match { margin-top: 16px; padding: 10px; border-radius: 6px; background: #e8f5e9; border: 1px solid #4caf50; color: #2e7d32; font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Cognito DR Demo</h1>
    <p class="subtitle">AWS Cognito Identity Provider Failover</p>

    <div id="login-section">
      <select id="region-select" class="region-select">
        <option value="us-east-1">us-east-1 (N. Virginia)</option>
        <option value="us-west-2">us-west-2 (Oregon)</option>
      </select>
      <button class="btn btn-login" onclick="login()">Sign in with Google</button>
    </div>

    <div id="result" class="result">
      <p class="label">Authenticated via Cognito in</p>
      <div id="region-badge" class="region-badge"></div>
      <br>
      <p class="label" style="margin-top: 12px;">User</p>
      <p id="user-email" class="user-email"></p>

      <div class="id-row">
        <div><span class="id-label">Cognito Sub (regional - changes per pool)</span><br><span id="cognito-sub" class="id-value"></span></div>
      </div>
      <div class="id-row">
        <div><span class="id-label">Google Sub (stable - same across regions)</span><br><span id="google-sub" class="id-value"></span></div>
      </div>
      <div id="match-note" class="id-match" style="display:none;"></div>

      <button class="btn btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <script>
    var CONFIG = {
      'us-east-1': {
        domain: '${cognito_east_domain}',
        clientId: '${cognito_east_client_id}',
        region: '${cognito_east_region}'
      },
      'us-west-2': {
        domain: '${cognito_west_domain}',
        clientId: '${cognito_west_client_id}',
        region: '${cognito_west_region}'
      }
    };
    var CALLBACK_URL = '${cloudfront_url}';

    function login() {
      var region = document.getElementById('region-select').value;
      localStorage.setItem('cognito_region', region);
      var cfg = CONFIG[region];
      var url = cfg.domain + '/login'
        + '?client_id=' + cfg.clientId
        + '&response_type=token'
        + '&scope=openid+email+profile'
        + '&redirect_uri=' + encodeURIComponent(CALLBACK_URL);
      window.location.href = url;
    }

    function logout() {
      var region = localStorage.getItem('cognito_region') || 'us-east-1';
      localStorage.removeItem('cognito_region');
      // Keep cognito_subs so we can compare across region logins
      var cfg = CONFIG[region];
      var url = cfg.domain + '/logout'
        + '?client_id=' + cfg.clientId
        + '&logout_uri=' + encodeURIComponent(CALLBACK_URL);
      window.location.href = url;
    }

    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(
        atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join('')
      );
      return JSON.parse(jsonPayload);
    }

    function handleCallback() {
      var hash = window.location.hash.substring(1);
      if (!hash) return;

      var params = {};
      hash.split('&').forEach(function(part) {
        var kv = part.split('=');
        params[kv[0]] = decodeURIComponent(kv[1]);
      });

      if (!params.id_token) return;

      var claims = parseJwt(params.id_token);
      var region = localStorage.getItem('cognito_region') || 'unknown';
      var isEast = region === 'us-east-1';

      // Cognito sub is the pool-specific ID, Google sub is in the username or identities
      var cognitoSub = claims.sub || 'N/A';
      // Google sub is typically in the "cognito:username" as "Google_<google_sub>"
      var cognitoUsername = claims['cognito:username'] || '';
      var googleSub = cognitoUsername.indexOf('Google_') === 0 ? cognitoUsername.replace('Google_', '') : cognitoUsername;

      // Store subs per region for comparison
      var prevSubs = JSON.parse(localStorage.getItem('cognito_subs') || '{}');
      prevSubs[region] = { cognitoSub: cognitoSub, googleSub: googleSub };
      localStorage.setItem('cognito_subs', JSON.stringify(prevSubs));

      document.getElementById('login-section').style.display = 'none';
      var resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.className = 'result ' + (isEast ? 'east' : 'west');
      document.getElementById('region-badge').textContent = region;
      document.getElementById('user-email').textContent = claims.email || 'Unknown';
      document.getElementById('cognito-sub').textContent = cognitoSub;
      document.getElementById('google-sub').textContent = googleSub;

      // Show comparison if user has logged in with both regions
      var matchNote = document.getElementById('match-note');
      if (prevSubs['us-east-1'] && prevSubs['us-west-2']) {
        var sameGoogle = prevSubs['us-east-1'].googleSub === prevSubs['us-west-2'].googleSub;
        var diffCognito = prevSubs['us-east-1'].cognitoSub !== prevSubs['us-west-2'].cognitoSub;
        if (sameGoogle && diffCognito) {
          matchNote.style.display = 'block';
          matchNote.innerHTML = 'Google Sub matches across regions (same user).<br>'
            + '<span style="font-size:11px;font-weight:normal;color:#555;">'
            + 'us-east-1 Cognito Sub: ' + prevSubs['us-east-1'].cognitoSub + '<br>'
            + 'us-west-2 Cognito Sub: ' + prevSubs['us-west-2'].cognitoSub + '<br>'
            + 'Google Sub (both): ' + prevSubs['us-east-1'].googleSub
            + '</span>';
        }
      }

      // Clean up the URL
      history.replaceState(null, '', window.location.pathname);
    }

    handleCallback();
  </script>
</body>
</html>
